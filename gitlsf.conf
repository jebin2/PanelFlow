# Remove the directory from tracking
git rm -r Fonts/

# Commit the removal
git commit -m "Remove Fonts directory for LFS migration"

# Remove the entire Fonts directory from git history
git filter-branch --force --index-filter \
'git rm -r --cached --ignore-unmatch Fonts' \
--prune-empty --tag-name-filter cat -- --all

# Clean up
git for-each-ref --format="delete %(refname)" refs/original | git update-ref --stdin
git reflog expire --expire=now --all
git gc --prune=now

# Track all Fonts files with LFS
git lfs track "Fonts/**"

# Or be more specific by file type
git lfs track "Fonts/**/*.mp3"
git lfs track "Fonts/**/*.mp4"
git lfs track "Fonts/**/*.wav"
git lfs track "Fonts/**/*.gif"
git lfs track "Fonts/**/*.png"
git lfs track "Fonts/**/*.jpg"
git lfs track "Fonts/**/*.svg"
git lfs track "Fonts/**/*.ttf"

# Add the gitattributes
git add .gitattributes
git commit -m "Add LFS tracking for Fonts directory"

# The Fonts directory should still exist locally with all your files
# Just add it back (LFS will handle tracked files automatically)
# mkdir Fonts
# cp -r ../CaptionCreator/media/background_music media/
cp -r ../CaptionCreator/Fonts .

git add Fonts
git commit -m "Re-add Fonts directory with LFS"
git push origin main --force  # Force needed because we cleaned history

# Check which files are tracked by LFS
git lfs ls-files

# Check LFS status
git lfs status