<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
    <style>
        * {
            font-family: cursive;
            font-size: 1.2rem;
        }

        body {
            font-family: cursive;
            color: #2C3E50;
            margin: 0;
            padding: 20px;
            line-height: 1.8;
            font-size: 1.2rem;
            background-color: #5a6df3;
        }

        h1 {
            text-align: center;
            color: #000000;
            text-shadow: 4px 4px 0 #FF6B6B,
                8px 8px 0 rgba(0, 0, 0, 0.2);
            font-size: 2.5em;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        form {
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2),
                inset 0 0 15px rgba(255, 107, 107, 0.2);
            border: 3px solid #000000;
        }

        label {
            display: block;
            margin: 10px 0 8px;
            color: #FF6B6B;
            font-weight: bold;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.1);
        }

        input[type="text"] {
            /* width: calc(100% - 24px); */
            padding: 10px 12px;
            border: 10px solid #4ECDC4;
            background: white;
            font-weight: 900;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #FF6B6B;
            outline: none;
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.5);
        }

        .edit-button {
            display: block;
            width: 100%;
            text-align: center;
            background-color: #4ECDC4;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 0;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 900;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #3DBDB4;
            margin-top: 15px;
        }

        .edit-button:hover {
            background-color: #3DBDB4;
            transform: translateY(-2px);
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .media-item {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2),
                inset 0 0 15px rgba(255, 107, 107, 0.15);
            /* border: 3px solid #4ECDC4; */
            aspect-ratio: 1;
            transition: transform 0.3s ease;
        }

        .media-item:hover {
            transform: rotateY(10deg) scale(1.05);
            box-shadow: 0 0 20px #ef4e4e;
        }

        .media-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-buttons {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            /* background: #5a6df3; */
            display: flex;
            justify-content: space-around;
        }

        .delete-button,
        .edit-button {
            width: 100%;
            flex: 1;
            margin: 0 5px;
            background-color: #FF6B6B;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 900;
            box-shadow: 0 4px 0 #E64C4C;
        }

        .edit-button {
            background-color: #4ECDC4;
            box-shadow: 0 4px 0 #3DBDB4;
        }

        .delete-button:hover {
            background-color: #E64C4C;
            transform: translateY(-2px);
            box-shadow: 0px 0px 20px 7px #E64C4C;
        }

        .edit-button:hover {
            background-color: #3DBDB4;
            transform: translateY(-2px);
            box-shadow: 0px 0px 20px 7px #3DBDB4;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0);
            }
        }

        h1:hover {
            animation: bounce 0.5s ease;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #FF6B6B;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #4ECDC4;
        }

        .modal {
            display: none;
            /* Hidden by default */
            position: fixed;
            z-index: 1000;
            /* Ensure it appears above other elements */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            /* Dimmed background */
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            background: none;
            /* No background to keep focus on the image */
            border: none;
            padding: 0;
            max-width: 90%;
            max-height: 90%;
            margin: auto;
        }

        .modal img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            margin: auto;
            object-fit: contain;
        }

        .close {
            right: 60px;
            color: #FF6B6B;
            font-size: 80px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: fixed;
            top: 22px;
            z-index: 10000
        }

        .close:hover {
            color: #E64C4C;
            transform: rotate(90deg);
        }


        .directory-interface {
            display: flex;
            background-color: rgba(0, 240, 255, 0.05);
            border: 2px solid var(--neon-blue);
            border-radius: 10px 10px 0px 0px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            width: 50%;
            margin-left: 25%;
        }

        .directory-interface2 {
            border-radius: 0px 0px 10px 10px;
        }

        .directory-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--neon-blue);
            padding: 15px;
            font-size: 1rem;
        }

        .fetch-button {
            background-color: #4ecdc4;
            color: var(--dark-background);
            border: none;
            padding: 15px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 140px;
        }

        .fetch-button:hover {
            background-color: #FF6B6B;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .file_name {
            position: absolute;
            color: red;
            left: 10px;
            word-break: break-all;
        }

        #typeModal {
            display: none;
            width: 50%;
            height: 400px;
            left: 25%;
            top: 32%;
            padding: 10px;
            justify-content: unset
        }

        #typeModal>button {
            width: auto;
        }


        .type-filter {
            padding: 12px;
            border: 10px solid #4ECDC4;
            background: white;
            min-width: 140px;
        }

        .type-filter:focus {
            border-color: #FF6B6B;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
    </style>
</head>

<body>
    <h1>Media Gallery</h1>

    <div class="directory-interface">
        <input type="text" id="directory" class="directory-input" placeholder="Enter media directory path"
            value="/home/jebin/git/CaptionCreator/media/anime_x_pic">
        <button class="fetch-button" onclick="handleFetch()">SCAN</button>
    </div>
    <div class="directory-interface directory-interface2">
        <input type="text" class="directory-input" id="searchInput" placeholder="Search entries...">

        <select class="type-filter" id="typeFilter">
            <option value="all">All</option>
            <option value="image">Image</option>
            <option value="video">Video</option>
        </select>
    </div>

    <div class="media-grid" id="mediaGrid">
        <!-- Media items will be dynamically inserted here -->
    </div>


    <div id="outputModal" class="modal">
        <div class="modal-content table-container" style="max-width: none; position: relative;">
            <div id="tempName" class="file_name" style="text-align: center; position: relative;"></div>
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="media-buttons" style="    z-index: 100000;
            top: 0;
            height: fit-content;
            left: unset;
            display: inline-grid;
            gap: 10px;
            top: 120px;
            right: 36px;">
                <button class="delete-button" onclick="deleteMedia();closeModal();">Delete</button>
                <button class="edit-button" onclick="addMedia();closeModal();">Add</button>
            </div>
            <img id="viewId" src=""
                style="height: auto; display: block; margin: auto; max-width: 90vw; max-height: 90vh; object-fit: contain; border: 4px solid #5a6df3">
            <div id="videoId"></div>
        </div>
    </div>
    <div id="typeModal" class="modal">
        <input type="text" class="directory-input" id="tempTitle" placeholder="optional title">
        <button class="edit-button" onclick="typeModalAction('anime_x_pic')">anime</button>
        <button class="edit-button" onclick="typeModalAction('movie_x_pic')">movie</button>
        <button class="edit-button" onclick="typeModalAction('comic_x_pic')">comic</button>
        <button class="edit-button" onclick="typeModalAction('sliding_puzzle')">sliding puzzle</button>
        <button class="delete-button" onclick="typeModalAction('close')">cancel</button>
    </div>
    <script>
        const directoryInput = document.getElementById('directory');
        const mediaGrid = document.getElementById('mediaGrid');
        var page = 0
        var allFiles = []
        function handleFetch() {
            page = 0
            const directory = directoryInput.value.trim();
            mediaGrid.innerHTML = ''
            if (!directory) {
                alert("Please enter a valid directory path.");
                return;
            }

            loadMediaFiles(directory);
        }
        async function loadMediaFiles(directory) {
            try {
                if (window.requestIsInProgress) {
                    return false;
                }
                window.requestIsInProgress = true;
                let type = document.getElementById("typeFilter").value;
                const response = await fetch(`/api/media?directory=${encodeURIComponent(directory)}&page=${page}&type=${type}`);
                allFiles = await response.json();
                delete window.requestIsInProgress
                page++
                if (page == 0 && allFiles.length === 0) {
                    mediaGrid.innerHTML = '<div class="empty-state">No media files found in this directory</div>';
                    return;
                }
                displayMediaFiles();
            } catch (error) {
                console.error('Error loading media files:', error);
                mediaGrid.innerHTML = '<div class="empty-state">Error loading media files</div>';
            }
        }

        function filterEntries() {
            const typeFilter = document.getElementById("typeFilter").value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            return allFiles.filter(x => x.name_w_ext.toLowerCase().includes(searchTerm) && ((typeFilter === "all") || (typeFilter === "video" && x.name_w_ext.endsWith(".mp4")) || (typeFilter === "image" && (x.name_w_ext.endsWith(".png") || x.name_w_ext.endsWith(".jpg")))))
        }

        function onInputChange() {
            mediaGrid.innerHTML = '';
            displayMediaFiles()
        }

        function displayMediaFiles() {
            files = filterEntries()
            if (page == 0) {
                mediaGrid.innerHTML = '';
            }
            files.forEach(file => {
                const mediaItem = document.createElement('div');
                mediaItem.className = 'media-item';
                mediaItem.id = file.name

                const preview = document.createElement('img');
                preview.className = 'media-preview';
                preview.src = "/api/media/file?file_path=" + file.cache_full_path
                if (preview.tagName === 'VIDEO') {
                    preview.controls = true;
                }

                const file_name = document.createElement('div');
                file_name.className = 'file_name';
                file_name.textContent = file.name_w_ext

                const buttons = document.createElement('div');
                buttons.className = 'media-buttons';

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-button';
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = () => deleteMedia(file);

                const addBtn = document.createElement('button');
                addBtn.className = 'edit-button';
                addBtn.textContent = 'Add';
                addBtn.onclick = () => addMedia(file);

                const viewBtn = document.createElement('button');
                viewBtn.className = 'edit-button';
                viewBtn.textContent = 'View';
                viewBtn.onclick = () => viewMedia(file);

                buttons.appendChild(deleteBtn);
                buttons.appendChild(addBtn);
                buttons.appendChild(viewBtn);

                mediaItem.appendChild(file_name);
                mediaItem.appendChild(preview);
                mediaItem.appendChild(buttons);
                mediaGrid.appendChild(mediaItem);
            });
        }

        async function post_process(file, response) {
            delete window.tempTitleContent;
            delete window.tempFileObj;
            const res = await response.json();
            if (res.success) {
                document.getElementById(file.name).remove();
                document.getElementById('typeModal').style.display = 'none';
            }
        }

        async function deleteMedia(file) {
            try {
                file = file ? file : window.tempFileObj
                response = await fetch("/api/media?file_path=" + file.original_full_path, {
                    method: 'DELETE'
                });
                post_process(file, response)
                await fetch("/api/media?file_path=" + file.cache_full_path, {
                    method: 'DELETE'
                });
            } catch (error) {
                console.error('Error deleting media:', error);
                alert('Failed to delete file');
            }
        }

        async function typeModalAction(type) {
            if (type == 'close') {
                document.getElementById('typeModal').style.display = 'none';
            } else {
                window.tempTitleContent = document.getElementById('tempTitle').value;
                addMedia(window.tempFileObj, type)
            }
        }

        async function addMedia(file, type) {
            try {
                file = file ? file : window.tempFileObj
                if (window.tempTitleContent === undefined || window.tempTitleContent === null) {
                    document.getElementById('typeModal').style.display = 'grid';
                    window.tempFileObj = file
                } else {
                    response = await fetch(`/api/media/add?file_path=` + file.original_full_path + "&type=" + type + "&title=" + window.tempTitleContent, {
                        method: 'POST'
                    });
                    post_process(file, response)
                }
            } catch (error) {
                console.error('Error adding media:', error);
                alert('Failed to add file');
            }
        }
        async function viewMedia(file) {
            window.tempFileObj = file
            if (file.original_full_path.endsWith(".mp4")) {
                videoURL = "/api/media/file?file_path=" + file.original_full_path;
                document.getElementById("videoId").innerHTML = `<video controls style="height: auto; display: block; margin: auto; max-width: 90vw; max-height: 90vh; object-fit: contain; border: 4px solid red">
                <source src="${videoURL}" type="video/mp4">
            </video>`
            } else {
                document.getElementById("viewId").src = "/api/media/file?file_path=" + file.original_full_path;
            }
            document.getElementById('outputModal').style.display = 'block';
            document.getElementById('tempName').textContent = file.name_w_ext;
        }
        function closeModal() {
            document.getElementById("viewId").src = ""
            document.getElementById("videoId").innerHTML = ""
            document.getElementById('outputModal').style.display = 'none';
        }
        function onScroll() {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            // Calculate the total scrollable height
            const scrollHeight = document.documentElement.scrollHeight;
            // Calculate the visible height
            const clientHeight = document.documentElement.clientHeight;

            // Check if we've reached the bottom
            if (scrollTop + clientHeight >= scrollHeight) {
                loadMediaFiles(document.getElementById('directory').value.trim())
            }
        }

        window.addEventListener('scroll', onScroll);
        document.getElementById('typeFilter').addEventListener('change', onInputChange);
        document.getElementById('searchInput').addEventListener('input', onInputChange);
    </script>
</body>

</html>
